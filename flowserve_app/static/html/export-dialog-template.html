<!-- Export Dialog Template -->
<div class="export-modal-overlay" id="exportModalOverlay">
  <div class="export-modal" id="exportModal">
    <!-- Header -->
    <div class="export-modal-header">
      <h2>
        <i class="fas fa-download icon"></i>
        Export Test Data
      </h2>
      <p>Select format to download your test results</p>
    </div>

    <!-- Body -->
    <div class="export-modal-body">
      <!-- Info Box -->
      <div class="export-info-box">
        <i class="fas fa-info-circle"></i>
        <span>All files contain complete test data and pressure readings</span>
      </div>

      <!-- Export Options Grid -->
      <div class="export-options" id="exportOptionsGrid">
        <!-- Excel Option -->
        <div class="export-option">
          <button class="export-option-btn export-excel" onclick="selectExportOption(this, 'excel')">
            <i class="fas fa-file-excel icon"></i>
            <span class="label">Excel</span>
            <span class="desc">Formatted report</span>
          </button>
        </div>

        <!-- CSV Option -->
        <div class="export-option">
          <button class="export-option-btn export-csv" onclick="selectExportOption(this, 'csv')">
            <i class="fas fa-file-csv icon"></i>
            <span class="label">CSV</span>
            <span class="desc">Data table</span>
          </button>
        </div>

        <!-- PDF Option -->
        <div class="export-option">
          <button class="export-option-btn export-pdf" onclick="selectExportOption(this, 'pdf')">
            <i class="fas fa-file-pdf icon"></i>
            <span class="label">PDF</span>
            <span class="desc">Graph chart</span>
          </button>
        </div>

        <!-- ZIP Option -->
        <div class="export-option">
          <button class="export-option-btn export-zip" onclick="selectExportOption(this, 'all')">
            <i class="fas fa-archive icon"></i>
            <span class="label">ZIP</span>
            <span class="desc">All files</span>
          </button>
        </div>
      </div>

      <!-- File Details -->
      <div id="exportFileDetails" style="display: none; margin-bottom: 20px;">
        <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; font-size: 13px;">
          <div style="margin-bottom: 8px;">
            <strong>Selected Format:</strong> <span id="selectedFormatName"></span>
          </div>
          <div>
            <strong>File Size:</strong> <span id="selectedFormatSize">Calculating...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="export-modal-footer">
      <button class="export-btn export-btn-secondary" onclick="closeExportDialog()">
        <i class="fas fa-times"></i>
        Cancel
      </button>
      <button class="export-btn export-btn-primary" id="exportDownloadBtn" onclick="performExport()" disabled>
        <i class="fas fa-download"></i>
        Download
      </button>
    </div>
  </div>
</div>

<style>
  /* Inline styles for quick implementation */
  .export-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .export-modal {
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    max-width: 500px;
    width: 90%;
    animation: slideUp 0.4s ease-out;
    overflow: hidden;
  }

  @keyframes slideUp {
    from {
      transform: translateY(30px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .export-modal-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 25px;
    text-align: center;
  }

  .export-modal-header h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .export-modal-header p {
    margin: 8px 0 0 0;
    font-size: 14px;
    opacity: 0.9;
  }

  .export-modal-body {
    padding: 30px;
  }

  .export-info-box {
    background: #e3f2fd;
    border-left: 4px solid #2196f3;
    padding: 12px 15px;
    border-radius: 4px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #1565c0;
  }

  .export-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
  }

  .export-option-btn {
    width: 100%;
    padding: 20px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #333;
  }

  .export-option-btn:hover {
    border-color: #667eea;
    background: #f8f9ff;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
  }

  .export-option-btn.active {
    border-color: #667eea;
    background: #667eea;
    color: white;
  }

  .export-option-btn .icon {
    font-size: 24px;
  }

  .export-option-btn .label {
    font-weight: 600;
  }

  .export-option-btn .desc {
    font-size: 12px;
    opacity: 0.7;
    font-weight: 400;
  }

  .export-modal-footer {
    padding: 20px 30px;
    background: #f8f9fa;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .export-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .export-btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .export-btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
  }

  .export-btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .export-btn-secondary {
    background: #e0e0e0;
    color: #333;
  }

  .export-btn-secondary:hover {
    background: #d0d0d0;
  }

  @media (max-width: 600px) {
    .export-modal {
      width: 95%;
    }

    .export-options {
      grid-template-columns: 1fr;
    }

    .export-modal-footer {
      flex-direction: column-reverse;
    }

    .export-btn {
      width: 100%;
      justify-content: center;
    }
  }
</style>
